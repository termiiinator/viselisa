{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Виселица — Итальянские футболисты</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    <main class="container">
        <h1>Виселица: итальянские футболисты</h1>
        <p class="subtitle">Угадайте имя или фамилию игрока по буквам.</p>

        <section class="board">
            <div class="gallows">
                <svg width="200" height="240" viewBox="0 0 200 240">
                    <line class="part visible" x1="20" y1="220" x2="120" y2="220"></line>
                    <line class="part visible" x1="50" y1="220" x2="50" y2="30"></line>
                    <line class="part visible" x1="50" y1="30" x2="140" y2="30"></line>
                    <line class="part visible" x1="140" y1="30" x2="140" y2="55"></line>
                    <circle id="hangman-1" class="part" cx="140" cy="75" r="20"></circle>
                    <line id="hangman-2" class="part" x1="140" y1="95" x2="140" y2="145"></line>
                    <line id="hangman-3" class="part" x1="140" y1="110" x2="115" y2="130"></line>
                    <line id="hangman-4" class="part" x1="140" y1="110" x2="165" y2="130"></line>
                    <line id="hangman-5" class="part" x1="140" y1="145" x2="120" y2="180"></line>
                    <line id="hangman-6" class="part" x1="140" y1="145" x2="160" y2="180"></line>
                </svg>
            </div>

            <div class="word" id="wordDisplay">_ _ _ _</div>
            <div class="letters">
                <label for="letterInput">Введите букву:</label>
                <input id="letterInput" type="text" maxlength="1" autocomplete="off" />
                <button id="guessButton">Проверить</button>
                <button id="newGameButton" class="secondary">Новая игра</button>
            </div>
            <p class="used" id="usedLetters">Ошибки: —</p>
            <p class="message" id="message"></p>
        </section>

        <section class="hints">
            <h2>Подсказки</h2>
            <ul id="hintsList"></ul>
        </section>
    </main>

    <script src="{% static 'app.js' %}"></script>
</body>
</html>
